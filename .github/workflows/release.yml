name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning

  lint-powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings PSGallery
          $results | Format-Table -AutoSize
          if ($results) { exit 1 }

  build:
    needs: [lint-shell, lint-powershell]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build artifacts
        run: |
          zip "Switch-AwsProfile-${{ github.ref_name }}.zip" Switch-AwsProfile.ps1
          tar -czf "switch-aws-profile-${{ github.ref_name }}.tar.gz" switch-aws-profile.sh

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            Switch-AwsProfile-*.zip
            switch-aws-profile-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Attest artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            Switch-AwsProfile-*.zip
            switch-aws-profile-*.tar.gz

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            Switch-AwsProfile-*.zip
            switch-aws-profile-*.tar.gz
